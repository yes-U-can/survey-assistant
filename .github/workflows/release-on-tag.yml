name: release-on-tag

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
